<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Modern Shop</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.558), rgba(0, 0, 0, 0.427)), 
            url('https://images.pexels.com/photos/6214383/pexels-photo-6214383.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .login-container { 
            background: rgba(255, 255, 255, 0.692); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }

        h2 { color: #333; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        input:focus { border-color: #ff9900; outline: none; }

        .btn-login { 
            width: 100%; padding: 14px; background: #ff9900; border: none; border-radius: 8px; 
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s; 
        }
        .btn-login:hover { background: #e68a00; }
        
        .forgot-btn { background: none; border: none; color: #666; font-size: 0.85rem; cursor: pointer; margin-top: 10px; text-decoration: underline; }
        .footer-link { margin-top: 20px; font-size: 0.9rem; color: #666; }
        .footer-link a { color: #ff9900; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login to Modern Shop</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
            <br>
            <button type="button" class="forgot-btn" onclick="alert('Redirecting to reset password...')">Forgot Password?</button>
        </form>
        <p class="footer-link">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script>
    const API_BASE_URL = 'http://localhost:3000';

    function saveAuthToken(token) {
        if (!token) return;
        localStorage.setItem('authToken', token);
        sessionStorage.setItem('authToken', token);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                saveAuthToken(data.token || data.accessToken);

                alert("Login successful!");
                window.location.href = 'shop.html';
            } else {
                const errorData = await response.json().catch(() => ({ message: 'Unexpected error' }));
                alert("Login failed: " + (errorData.message || "Unknown error"));
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Could not connect to the server. Make sure the backend is running on port 9000.");
        }
    });
    </script>
</body>
</html>
