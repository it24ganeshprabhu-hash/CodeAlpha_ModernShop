<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Modern Shop</title>
    <style>
    :root {--primary: #ff9900; --bg: #f8f9fa; --card: #ffffff; --text: #333;}

    body {
        font-family: 'Segoe UI', system-ui, sans-serif; 
        background-color: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 20px;
        min-height: 100vh;
    }

    .profile-container {
        width: 100%;
        max-width: 1200px; 
        margin: auto; 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 20px;
    }

    /* Mobile Adjustments */
    @media (max-width: 768px) {
        .profile-container { 
            grid-template-columns: 1fr; 
        }
    }

    .nav-container {
        grid-column: 1 / -1; 
    }

    .card {
        background: var(--card);
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    h2 {
        margin-top: 0;
        font-size: 1.5rem;
        color: #111;
        margin-bottom: 20px;
        border-left: 4px solid var(--primary);
        padding-left: 15px;
    }

    .form-group { margin-bottom: 20px; }

    label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
        color: #666;
    }

    input {
        width: 100%;
        padding: 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        box-sizing: border-box;
    }

    .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        margin-top: 10px;
    }

    .btn-back { background: #eee; color: #555; width: auto; padding: 10px 25px; }
    .btn-update { background: var(--primary); color: white; }
    .btn-logout { background: #fffafa; color: #d9534f; border: 1px solid #ffdcdc; }

    .bill-item {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 10px;
        border-left: 3px solid #ddd;
        display: flex;
        justify-content: space-between;
    }
    </style>
</head>
<body>
<div class="profile-container">
    <div class="nav-container">
        <button class="btn btn-back" onclick="window.location.href='shop.html'">← Back to Shop</button>
    </div>
    <div class="card">
        <h2>Account Settings</h2>
        <div class="form-group"><label>Username</label><input type="text" id="username" disabled></div>
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Phone</label><input type="text" id="phone"></div>
        <div class="form-group"><label>Address</label><input type="text" id="address"></div>
        <div class="form-group"><label>New Password</label><input type="password" id="password" placeholder="Leave blank to keep current"></div>
        <button class="btn btn-update" onclick="updateProfile()">Update Profile</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
    <div class="card">
        <h2>Order History</h2>
        <div id="billList">Loading bills...</div>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:3000';
    const token = localStorage.getItem('authToken');

    if (!token) window.location.href = 'login.html';

    async function loadProfile() {
        try {
            const res = await fetch(`${API_BASE_URL}/profile`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            document.getElementById('username').value = data.username;
            document.getElementById('email').value = data.email;
            document.getElementById('phone').value = data.phone;
            document.getElementById('address').value = data.address;
            const orderRes = await fetch(`${API_BASE_URL}/orders`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            const orders = await orderRes.json();
            const sortedOrders = Array.isArray(orders) ? [...orders].reverse() : [];
            
            const billList = document.getElementById('billList');
            billList.style.maxHeight = '500px';
            billList.style.overflowY = 'auto';
            billList.style.paddingRight = '5px';
            
            if (sortedOrders.length > 0) {
                billList.innerHTML = sortedOrders.map(order => {
                    const date = new Date(order.createdAt).toLocaleDateString();
                    const time = new Date(order.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    const productsList = order.items.map(item => `
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                            <img src="${item.imageUrl || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;">
                            <div>
                                <div style="font-weight: 600;">${item.name}</div>
                                <div style="font-size: 0.8rem; color: #666;">Qty: ${item.quantity}</div>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="bill-item" style="flex-direction: column; align-items: flex-start;">
                            <div style="width: 100%; margin-bottom: 10px; font-size: 0.85rem; color: #888;">
                                ${date} • ${time}
                            </div>
                            <div style="width: 100%;">${productsList}</div>
                            <div style="margin-top: 10px; width: 100%; text-align: right; border-top: 1px solid #eee; padding-top: 10px;">
                                <strong>Total: ₹${order.total || '0.00'}</strong>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                billList.innerHTML = '<p>No orders found yet.</p>';
            }
        } catch (e) { logout(); }
    }

    async function updateProfile() {
        const body = {
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            password: document.getElementById('password').value
        };
        await fetch(`${API_BASE_URL}/profile/update`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(body)
        });
        alert('Profile updated!');
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    loadProfile();
</script>
</body>
</html>
