<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Modern Shop</title>
    <style>
    :root {--primary: #ff9900; --bg: #f8f9fa; --card: #ffffff; --text: #333;}
    body {font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text);margin: 0; padding: 40px 20px;}
    .profile-container {max-width: 1000px; margin: auto;display: grid; grid-template-columns: 1fr 1fr; gap: 30px;}

    .card {
        background: var(--card);
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    h2 {
        margin-top: 0;
        font-size: 1.5rem;
        color: #111;
        margin-bottom: 20px;
        border-left: 4px solid var(--primary);
        padding-left: 15px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 8px;
        color: #777;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        transition: border 0.3s, box-shadow 0.3s;
        box-sizing: border-box;
    }

    input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.1);
    }

    input:disabled {
        background: #f0f0f0;
        cursor: not-allowed;
    }

    .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        transition: transform 0.2s, background 0.3s;
    }

    .btn:hover {
        transform: translateY(-1px);
    }

    .btn-update {
        background: var(--primary);
        color: white;
        margin-bottom: 10px;
    }

    .btn-logout {
        background: #fffafa;
        color: #d9534f;
        border: 1px solid #ffdcdc;
    }

    .bill-item {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 10px;
        border-left: 3px solid #ddd;
        display: flex;
        justify-content: space-between;
        transition: border-left-color 0.3s;
    }

    .bill-item:hover {
        border-left-color: var(--primary);
    }

    @media (max-width: 768px) {
        .profile-container {
            grid-template-columns: 1fr;
        }
    }
    </style>
</head>
<body>
<div class="profile-container">
    <div class="card">
        <h2>Account Settings</h2>
        <div class="form-group"><label>Username</label><input type="text" id="username" disabled></div>
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Phone</label><input type="text" id="phone"></div>
        <div class="form-group"><label>Address</label><input type="text" id="address"></div>
        <div class="form-group"><label>New Password</label><input type="password" id="password" placeholder="Leave blank to keep current"></div>
        <button class="btn btn-update" onclick="updateProfile()">Update Profile</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
    <div class="card">
        <h2>Order History</h2>
        <div id="billList">Loading bills...</div>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:3000';
    const token = localStorage.getItem('authToken');

    if (!token) window.location.href = 'login.html';

    async function loadProfile() {
        try {
            // Fetch User Profile
            const res = await fetch(`${API_BASE_URL}/profile`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            document.getElementById('username').value = data.username;
            document.getElementById('email').value = data.email;
            document.getElementById('phone').value = data.phone;
            document.getElementById('address').value = data.address;

            // Fetch Order History
            const orderRes = await fetch(`${API_BASE_URL}/orders`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            const orders = await orderRes.json();
            
            const billList = document.getElementById('billList');
            
            if (Array.isArray(orders) && orders.length > 0) {
                billList.innerHTML = orders.map(order => `
                    <div class="bill-item">
                        <span>Order #${order._id.slice(-6)}</span>
                        <strong>$${order.total || '0.00'}</strong>
                    </div>
                `).join('');
            } else {
                billList.innerHTML = '<p>No orders found yet.</p>';
            }
        } catch (e) { logout(); }
    }

    async function updateProfile() {
        const body = {
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            password: document.getElementById('password').value
        };
        await fetch(`${API_BASE_URL}/profile/update`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(body)
        });
        alert('Profile updated!');
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    loadProfile();
</script>
</body>
</html>
