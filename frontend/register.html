<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Modern Shop</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .register-container { 
            background: rgba(255, 255, 255, 0.692); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 600px; 
        }
        
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 30px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; margin-bottom: 8px; color: #444; font-size: 0.9rem; font-weight: 500; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus { 
            border-color: #ff9900; 
            outline: none; 
        }
        
        .btn-register { 
            width: 100%; 
            padding: 16px; 
            background: #ff9900; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 25px; 
            transition: background 0.3s ease;
        }
        
        .btn-register:hover { background: #e68a00; }
        
        .footer-link { text-align: center; margin-top: 25px; font-size: 0.95rem; color: #666; }
        .footer-link a { color: #ff9900; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Create Account</h2>
        <form id="registerForm">
            <div class="form-grid">
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="input-group full-width">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="input-group full-width">
                    <label for="address">Full Address</label>
                    <input type="text" id="address" required>
                </div>
                <div class="input-group full-width">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
            </div>
            <button type="submit" class="btn-register">Register</button>
        </form>
        <p class="footer-link">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userData = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('http://localhost:3000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();
                if (response.ok) {
                    alert("Registration successful!");
                    window.location.href = 'login.html';
                } else {
                    alert("Registration Error: " + result.message);
                }
            } catch (err) {
                alert("Server connection failed.");
            }
        });
    </script>
</body>
</html>
